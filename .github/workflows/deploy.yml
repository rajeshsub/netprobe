name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/echometer/' }}
          VITE_LOCATE_API_URL: ${{ vars.VITE_LOCATE_API_URL || 'https://locate.measurementlab.net/v2/nearest/ndt/ndt7' }}
          VITE_CLIENT_NAME: ${{ vars.VITE_CLIENT_NAME || 'echometer' }}
          VITE_CLIENT_VERSION: ${{ vars.VITE_CLIENT_VERSION || '1.0.0' }}
          VITE_REGION_US_EAST: ${{ vars.VITE_REGION_US_EAST || 'mlab1-lga05.mlab-oti.measurement-lab.org' }}
          VITE_REGION_US_WEST: ${{ vars.VITE_REGION_US_WEST || 'mlab1-lax05.mlab-oti.measurement-lab.org' }}
          VITE_REGION_EU_WEST: ${{ vars.VITE_REGION_EU_WEST || 'mlab1-lhr05.mlab-oti.measurement-lab.org' }}
          VITE_REGION_ASIA_EAST: ${{ vars.VITE_REGION_ASIA_EAST || 'mlab1-nrt05.mlab-oti.measurement-lab.org' }}
          VITE_REGION_OCEANIA: ${{ vars.VITE_REGION_OCEANIA || 'mlab1-syd05.mlab-oti.measurement-lab.org' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
