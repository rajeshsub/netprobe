name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test:coverage

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || '/netprobe/' }}
          VITE_LOCATE_API_URL: ${{ vars.VITE_LOCATE_API_URL || 'https://locate.measurementlab.net/v2/nearest/ndt/ndt7' }}
          VITE_CLIENT_NAME: ${{ vars.VITE_CLIENT_NAME || 'netprobe' }}
          VITE_CLIENT_VERSION: ${{ vars.VITE_CLIENT_VERSION || '1.0.0' }}
          VITE_REGION_US_EAST: ${{ vars.VITE_REGION_US_EAST || 'speedtest.newark.linode.com' }}
          VITE_REGION_US_WEST: ${{ vars.VITE_REGION_US_WEST || 'speedtest.fremont.linode.com' }}
          VITE_REGION_EU_WEST: ${{ vars.VITE_REGION_EU_WEST || 'speedtest.london.linode.com' }}
          VITE_REGION_ASIA_EAST: ${{ vars.VITE_REGION_ASIA_EAST || 'speedtest.tokyo2.linode.com' }}
          VITE_REGION_OCEANIA: ${{ vars.VITE_REGION_OCEANIA || 'speedtest.sydney.linode.com' }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
